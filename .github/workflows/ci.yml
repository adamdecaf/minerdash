name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout hasherdash
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum

      - name: Download asic-rs-go module
        run: |
          go mod download github.com/adamdecaf/asic-rs-go
          MODDIR="$(go list -m -f '{{.Dir}}' github.com/adamdecaf/asic-rs-go)"
          # Module cache is read-only; copy and make writable for cargo.
          rm -rf /tmp/asic-rs-go
          cp -a "$MODDIR" /tmp/asic-rs-go
          chmod -R u+w /tmp/asic-rs-go
          echo "ASIC_RS_GO=/tmp/asic-rs-go" >> "$GITHUB_ENV"
          echo "CGO_CFLAGS=-I/tmp/asic-rs-go/asicrs/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L/tmp/asic-rs-go/asicrs/lib -lasic_rs_ffi -lm -ldl -lpthread" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/tmp/asic-rs-go/asicrs/lib" >> "$GITHUB_ENV"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: /tmp/asic-rs-go/asic-rs-ffi -> target

      - name: Build asic-rs-go FFI
        run: make -C /tmp/asic-rs-go ffi

      - name: Unit tests (no cgo)
        env:
          CGO_ENABLED: "0"
        run: go test ./internal/config ./internal/store ./internal/axetemp -count=1

      - name: Build hasherdash
        env:
          CGO_ENABLED: "1"
        run: |
          # Use the tree with the built FFI (module cache has no .so/.a).
          go mod edit -replace=github.com/adamdecaf/asic-rs-go=/tmp/asic-rs-go
          go build -trimpath -o bin/hasherdash ./cmd/hasherdash

      - name: Verify binary links
        run: |
          test -x bin/hasherdash
          file bin/hasherdash
          ldd bin/hasherdash | tee /tmp/ldd.txt
          if grep -q asic_rs_ffi /tmp/ldd.txt; then
            echo "linked against libasic_rs_ffi (shared)"
          else
            echo "no shared asic_rs_ffi in ldd (likely static .a) — ok if binary built"
          fi

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout hasherdash
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: hasherdash:ci
          cache-from: type=gha,scope=hasherdash-docker
          cache-to: type=gha,mode=max,scope=hasherdash-docker

      - name: Smoke-test image
        run: |
          docker run --rm --entrypoint /usr/local/bin/hasherdash hasherdash:ci -h 2>&1 | head -20 || true
          docker run --rm --entrypoint /bin/sh hasherdash:ci -c '
            set -e
            test -x /usr/local/bin/hasherdash
            test -f /usr/local/lib/libasic_rs_ffi.so
            ldd /usr/local/bin/hasherdash | grep -q asic_rs_ffi
            echo "docker image ok"
          '
